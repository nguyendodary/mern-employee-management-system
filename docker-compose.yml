version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: ems-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: ems
    volumes:
      - mongodb_data:/data/db
    networks:
      - ems-network

  # Backend API
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ems-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://admin:adminpassword@mongodb:27017/ems?authSource=admin
      - JWT_SECRET=your_super_secret_jwt_key_change_in_production
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - ems-network

  # Frontend React App
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ems-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server
    networks:
      - ems-network

volumes:
  mongodb_data:

networks:
  ems-network:
    driver: bridge
